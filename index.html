<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Skin</title>
    <style>
        body {
            background-color: #121212; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #FFDE4D;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .download-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #121212; 
            background-color: #FFDE4D; 
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 222, 77, 0.2);
        }

        .download-btn:hover {
            background-color: #ffe670;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 222, 77, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Your file is ready</h1>
        <p>Click the button below to get your content.</p>
        
        <a href="https://backroom-topaz.vercel.app/Skin.png" download="Skin.png" class="download-btn">
            Download Skin.png
        </a>
    </div>

</body>
</html>
